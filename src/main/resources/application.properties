server.port=${PORT:3000}

spring.application.name=carbon-energy-platform
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:carbon_emission}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=${DB_CONNECTION_LIMIT:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.pool-name=CarbonPlatformHikariPool

spring.jackson.time-zone=Asia/Shanghai
spring.jackson.default-property-inclusion=non_null
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
