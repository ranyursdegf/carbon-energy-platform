services:
  mysql:
    image: mysql:8.4
    container_name: carbon-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DOCKER_MYSQL_ROOT_PASSWORD:-carbon_dev_password}
      MYSQL_DATABASE: carbon_emission
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build: .
    container_name: carbon-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      CORS_ORIGIN: "*"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DOCKER_MYSQL_ROOT_PASSWORD:-carbon_dev_password}
      DB_NAME: carbon_emission
      DB_CONNECTION_LIMIT: 10
      TZ: Asia/Shanghai
    ports:
      - "3000:3000"

volumes:
  mysql-data:
